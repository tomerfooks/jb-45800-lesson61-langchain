<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather Agent</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #f0f2f5;
  display: flex;
  justify-content: center;
  min-height: 100vh;
  padding: 20px;
}
#app {
  width: 100%;
  max-width: 640px;
  display: flex;
  flex-direction: column;
  background: #fff;
  border-radius: 16px;
  box-shadow: 0 4px 24px rgba(0,0,0,.08);
  overflow: hidden;
  height: 90vh;
}
header { padding: 20px 24px 12px; border-bottom: 1px solid #eee; }
header h1 { font-size: 22px; }
header p { font-size: 14px; color: #666; margin-top: 2px; }
#chat {
  flex: 1; overflow-y: auto; padding: 16px 24px;
  display: flex; flex-direction: column; gap: 12px;
}
.msg {
  max-width: 80%; padding: 10px 14px; border-radius: 14px;
  line-height: 1.45; font-size: 15px; white-space: pre-wrap; word-wrap: break-word;
}
.msg.user { align-self: flex-end; background: #007aff; color: #fff; border-bottom-right-radius: 4px; }
.msg.agent { align-self: flex-start; background: #e9eef2; color: #1c1c1e; border-bottom-left-radius: 4px; }
.msg.error { align-self: flex-start; background: #ffe8e8; color: #c41e3a; }
.msg.typing { align-self: flex-start; background: #e9eef2; color: #888; font-style: italic; }
#form {
  display: flex; gap: 8px; padding: 12px 24px 20px; border-top: 1px solid #eee;
}
#input {
  flex: 1; padding: 10px 14px; border: 1px solid #ddd;
  border-radius: 24px; font-size: 15px; outline: none;
}
#input:focus { border-color: #007aff; }
#form button {
  padding: 10px 20px; border: none; border-radius: 24px;
  background: #007aff; color: #fff; font-size: 15px; cursor: pointer;
}
#form button:hover { background: #0066d6; }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>🌤️ Weather Agent</h1>
    <p>Ask about the weather anywhere</p>
  </header>
  <div id="chat" role="log" aria-label="Chat messages"></div>
  <form id="form">
    <input type="text" id="input" placeholder="e.g. What's the weather in Tokyo?" autofocus>
    <button type="submit">Send</button>
  </form>
</div>
<script>
const chat = document.getElementById("chat");
const form = document.getElementById("form");
const input = document.getElementById("input");

function addMessage(text, role) {
  const el = document.createElement("div");
  el.className = "msg " + role;
  el.textContent = text;
  chat.appendChild(el);
  chat.scrollTop = chat.scrollHeight;
  return el;
}

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  const question = input.value.trim();
  if (!question) return;

  addMessage(question, "user");
  input.value = "";
  const typing = addMessage("…", "typing");

  try {
    const res = await fetch("/ask", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ question }),
    });
    const data = await res.json();
    typing.remove();
    if (data.answer) addMessage(data.answer, "agent");
    else addMessage("No response from agent.", "error");
  } catch (err) {
    typing.remove();
    addMessage("Network error. Is the server running?", "error");
  }
});
</script>
</body>
</html>
